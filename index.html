<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siktsimulator - Stabil Version</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        * { box-sizing: border-box; user-select: none; -webkit-touch-callout: none; }
        body { 
            margin: 0; padding: 0; background-color: #0d0d0d; color: #fff; 
            font-family: 'Roboto', sans-serif; display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }

        #left-panel {
            flex: 1; height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 10px;
            border-right: 1px solid #333; position: relative;
        }

        #target-box {
            width: 60vmin; height: 60vmin; max-width: 350px; max-height: 350px;
            background: #1a1a1a; border-radius: 50%; /* Rund box för snyggare gräns */
            display: flex; align-items: center; justify-content: center; position: relative;
            overflow: hidden; border: 2px solid #333;
        }

        #target {
            width: 90%; height: 90%; border-radius: 50%;
            background: repeating-radial-gradient( circle, #aa0000 0%, #aa0000 10%, #111 10%, #111 20%, #aa0000 20%, #aa0000 30%, #111 30%, #111 40%, #aa0000 40%, #aa0000 50% );
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        #crosshair {
            position: absolute; width: 14px; height: 14px; background: cyan; 
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px cyan; z-index: 10;
        }
        
        .bullet-hole {
            position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 0 5px rgba(255,255,255,0.8); z-index: 5;
        }

        #right-panel {
            flex: 1; height: 100%; display: flex; flex-direction: column; padding: 15px; justify-content: space-between; overflow-y: auto;
        }

        h1 { font-size: 4vmin; margin: 0; color: #00ffff; }
        .debug-log { font-size: 1.5vmin; color: #ff5252; margin-bottom: 10px; word-wrap: break-word;}
        .stats { background: #222; padding: 10px; border-radius: 5px; font-size: 2.5vmin; font-weight: bold; margin-bottom: 10px;}

        .btn-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .toggle-btn {
            flex: 1; background: #222; color: #aaa; border: 2px solid #444; 
            padding: 15px 0; font-size: 2.5vmin; font-weight: bold; border-radius: 6px; cursor: pointer;
        }
        .toggle-btn.active { background: #007bff; color: #fff; border-color: #0056b3; }

        .action-btn {
            width: 100%; padding: 20px; font-size: 3vmin; font-weight: bold; color: white;
            border: none; border-radius: 6px; cursor: pointer; margin-top: 5px;
        }
        #start-btn { background: #2e7d32; }
        #reset-btn { background: #d32f2f; display: none; }
    </style>
</head>
<body>

    <div id="left-panel">
        <div id="target-box">
            <div id="target"></div>
            <canvas id="heatmap-canvas"></canvas>
            <canvas id="trail-canvas"></canvas>
            <div id="crosshair"></div>
        </div>
    </div>

    <div id="right-panel">
        <div>
            <h1 id="status-text">REDO</h1>
            <div id="error-log" class="debug-log"></div>
            <div class="stats">
                Streak: <span id="streak" style="color:#ff9800">0</span> | 
                Snitt: <span id="snitt" style="color:#00ffff">0.0</span>
            </div>

            <p style="font-size: 2vmin; color:#888; margin-bottom:5px;">Riktning (Håll mobilen framför dig):</p>
            <div class="btn-group">
                <button class="toggle-btn active" id="btn-sidan" onclick="setMode('sidan')">Skärm mot dig</button>
                <button class="toggle-btn" id="btn-ovanpa" onclick="setMode('ovanpa')">Skärm uppåt</button>
            </div>

            <p style="font-size: 2vmin; color:#888; margin-bottom:5px;">Skjut med:</p>
            <div class="btn-group">
                <button class="toggle-btn active" id="btn-skarm" onclick="setTrigger('skarm')">Peka på skärm</button>
                <button class="toggle-btn" id="btn-ljud" onclick="setTrigger('ljud')">Ljud (Klick)</button>
            </div>
        </div>

        <div>
            <button class="action-btn" id="start-btn">GE TILLÅTELSER & STARTA</button>
            <button class="action-btn" id="reset-btn">KALIBRERA OM SIKTE</button>
        </div>
    </div>

    <script>
        const UI = {
            crosshair: document.getElementById('crosshair'),
            targetBox: document.getElementById('targetBox'),
            errorLog: document.getElementById('error-log'),
            status: document.getElementById('status-text'),
            startBtn: document.getElementById('start-btn'),
            resetBtn: document.getElementById('reset-btn')
        };

        let mode = 'sidan';
        let trigger = 'skarm';
        let isRunning = false;
        
        let startAlpha = null, startBeta = null, startGamma = null;
        let cx = 50, cy = 50;

        // Canvases
        const heatCanvas = document.getElementById('heatmap-canvas');
        const heatCtx = heatCanvas.getContext('2d');
        const trailCanvas = document.getElementById('trail-canvas');
        const trailCtx = trailCanvas.getContext('2d');
        let hitData = [], trailHistory = [];

        // Audio
        let audioCtx, analyser, dataArray;

        // --- Inställningar ---
        window.setMode = (m) => {
            mode = m;
            document.getElementById('btn-sidan').classList.toggle('active', m === 'sidan');
            document.getElementById('btn-ovanpa').classList.toggle('active', m === 'ovanpa');
            startAlpha = null; // Tvinga kalibrering
        };

        window.setTrigger = (t) => {
            trigger = t;
            document.getElementById('btn-skarm').classList.toggle('active', t === 'skarm');
            document.getElementById('btn-ljud').classList.toggle('active', t === 'ljud');
        };

        function logError(msg) {
            console.error(msg);
            UI.errorLog.innerText = msg;
        }

        // --- Startsekvens ---
        UI.startBtn.onclick = async () => {
            UI.errorLog.innerText = ""; // Rensa gamla fel
            
            // 1. Försök Helskärm (Kraschar inte om det nekas)
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
            } catch (e) { console.warn("Helskärm nekades, fortsätter ändå."); }

            // Matcha canvas-storlek till DOM
            const rect = heatCanvas.parentElement.getBoundingClientRect();
            heatCanvas.width = rect.width; heatCanvas.height = rect.height;
            trailCanvas.width = rect.width; trailCanvas.height = rect.height;

            // 2. Begär Gyro-tillåtelse (Kritiskt för iOS)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission !== 'granted') {
                        logError("Gyroskop nekades i webbläsaren. Ladda om sidan och tillåt.");
                        return;
                    }
                } catch(e) {
                    logError("Kunde inte begära gyro. Måste köras via HTTPS.");
                    return;
                }
            }

            // 3. Begär Mikrofon (Om valt)
            if (trigger === 'ljud') {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const source = audioCtx.createMediaStreamSource(stream);
                    analyser = audioCtx.createAnalyser();
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    listenForAudio();
                } catch(e) {
                    logError("Mikrofon nekades. Byt till 'Peka på skärm'.");
                    return;
                }
            }

            // Allt ok! Starta.
            window.addEventListener('deviceorientation', handleOrientation);
            requestAnimationFrame(renderTrail);
            
            isRunning = true;
            UI.startBtn.style.display = 'none';
            UI.resetBtn.style.display = 'block';
            UI.status.innerText = "AKTIV";
            UI.status.style.color = "#00e676";
        };

        UI.resetBtn.onclick = () => { startAlpha = null; };

        // --- Gyro-logik ---
        function handleOrientation(event) {
            if (!isRunning) return;
            
            // Kolla om vi faktiskt får data (datorer ger null)
            if (event.alpha === null) {
                logError("Får ingen data från gyroskopet. Sitter du vid en dator?");
                return;
            }

            if (startAlpha === null) {
                startAlpha = event.alpha; startBeta = event.beta; startGamma = event.gamma;
            }

            let deltaX = 0, deltaY = 0;

            if (mode === 'sidan') {
                deltaX = event.alpha - startAlpha;
                deltaY = event.beta - startBeta;
            } else {
                deltaX = event.gamma - startGamma;
                deltaY = event.beta - startBeta;
            }

            // Normalisera vinklar (förhindrar att siktet snurrar ett helt varv)
            if (deltaX > 180) deltaX -= 360; 
            if (deltaX < -180) deltaX += 360;

            // Känslighet
            cx = 50 - (deltaX * 3);
            cy = 50 - (deltaY * 3);

            // Tvinga siktet att stanna innanför boxen (0% till 100%)
            cx = Math.max(5, Math.min(95, cx));
            cy = Math.max(5, Math.min(95, cy));

            UI.crosshair.style.left = cx + "%";
            UI.crosshair.style.top = cy + "%";
        }

        // --- Skjutlogik ---
        document.body.addEventListener('touchstart', (e) => {
            // Skjut bara om man trycker på vänstra panelen (tavlan)
            if (isRunning && trigger === 'skarm' && e.target.closest('#left-panel')) {
                fireShot();
            }
        });

        function listenForAudio() {
            if (!isRunning || trigger !== 'ljud') return;
            analyser.getByteFrequencyData(dataArray);
            if (Math.max(...dataArray) > 200) {
                fireShot();
                setTimeout(() => requestAnimationFrame(listenForAudio), 400); // Cooldown
                return;
            }
            requestAnimationFrame(listenForAudio);
        }

        let totalScore = 0, totalShots = 0, streak = 0;

        function fireShot() {
            if (!isRunning) return;

            // Blixt
            document.body.style.backgroundColor = "#fff";
            setTimeout(() => { document.body.style.backgroundColor = "#0d0d0d"; }, 50);

            // Rita hål i DOM
            const hole = document.createElement('div');
            hole.className = 'bullet-hole';
            hole.style.left = cx + "%"; hole.style.top = cy + "%";
            document.getElementById('target-box').appendChild(hole);

            // Spara data till Heatmap & rita ut
            hitData.push({x: cx, y: cy});
            drawHeatmap();

            // Låtsas-rekyl (förskjuter startvärdet så du måste dra tillbaka telefonen)
            startBeta -= 3; 

            // Poängberäkning (distans från 50,50)
            const dist = Math.sqrt(Math.pow(cx - 50, 2) + Math.pow(cy - 50, 2));
            let points = 0;
            if (dist < 8) points = 10;
            else if (dist < 18) points = 8;
            else if (dist < 28) points = 6;
            else if (dist < 38) points = 4;
            else if (dist < 48) points = 2;

            if (points > 0) {
                streak++; UI.status.innerText = `TRÄFF! (${points}p)`; UI.status.style.color = "#00e676";
            } else {
                streak = 0; UI.status.innerText = "BOM!"; UI.status.style.color = "#ff1744";
            }

            totalShots++; totalScore += points;
            document.getElementById('streak').innerText = streak;
            document.getElementById('snitt').innerText = (totalScore / totalShots).toFixed(1);
        }

        // --- RITA SPÅR & HEATMAP ---
        function renderTrail() {
            if (!isRunning) return;
            trailHistory.push({ x: cx, y: cy });
            if (trailHistory.length > 20) trailHistory.shift();

            trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
            if (trailHistory.length > 1) {
                const w = trailCanvas.width, h = trailCanvas.height;
                for (let i = 0; i < trailHistory.length - 1; i++) {
                    trailCtx.beginPath();
                    trailCtx.moveTo((trailHistory[i].x / 100) * w, (trailHistory[i].y / 100) * h);
                    trailCtx.lineTo((trailHistory[i+1].x / 100) * w, (trailHistory[i+1].y / 100) * h);
                    
                    const opacity = (i / trailHistory.length);
                    trailCtx.strokeStyle = `rgba(0, 255, 255, ${opacity})`;
                    trailCtx.lineWidth = 2;
                    trailCtx.stroke();
                }
            }
            requestAnimationFrame(renderTrail);
        }

        function drawHeatmap() {
            heatCtx.clearRect(0, 0, heatCanvas.width, heatCanvas.height);
            const w = heatCanvas.width, h = heatCanvas.height;
            const radius = w * 0.15;

            hitData.forEach(hit => {
                const x = (hit.x / 100) * w;
                const y = (hit.y / 100) * h;
                const gradient = heatCtx.createRadialGradient(x, y, 0, x, y, radius);
                gradient.addColorStop(0, 'rgba(255, 255, 0, 0.6)');
                gradient.addColorStop(0.4, 'rgba(255, 0, 0, 0.3)');
                gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
                heatCtx.fillStyle = gradient;
                heatCtx.beginPath(); heatCtx.arc(x, y, radius, 0, Math.PI * 2); heatCtx.fill();
            });
        }
    </script>
</body>
</html>
