<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>Mantis-Klonen Ultimate</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background-color: #0a0a0a; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: row; height: 100dvh; width: 100vw; 
            overflow: hidden; user-select: none; -webkit-user-select: none; overscroll-behavior: none;
        }

        #visuals-panel { 
            flex: 1.2; display: flex; flex-direction: column; align-items: center; 
            justify-content: space-evenly; padding: 10px; background-color: #121212;
            border-right: 2px solid #333; max-width: 60vw; 
        }

        .view-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 48%; }
        .view-title { font-size: clamp(10px, 1.5vh, 14px); color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

        canvas { 
            background-color: #1e1e1e; border-radius: 12px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 4px 8px rgba(0,0,0,0.5);
            max-width: 100%; max-height: calc(100% - 20px); object-fit: contain; 
        }

        #controls-panel { 
            flex: 1; display: flex; flex-direction: column; padding: 15px; 
            background-color: #0a0a0a; justify-content: center; align-items: stretch;
        }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; flex-shrink: 0;}
        
        button { 
            background-color: #4CAF50; color: white; border: none; 
            padding: clamp(10px, 2vh, 20px); font-size: clamp(14px, 2vh, 18px); 
            border-radius: 8px; font-weight: bold; cursor: pointer; touch-action: manipulation; transition: 0.1s;
        }
        button:active { transform: scale(0.97); }

        #standbyBtn { background-color: #FF9800; display: none; color: black; }
        #shootBtn { 
            background-color: #f44336; display: none; flex-grow: 1; font-size: clamp(24px, 4vh, 40px); 
            border-radius: 15px; border: 4px solid #b71c1c; box-shadow: 0 8px 15px rgba(244, 67, 54, 0.4); margin-top: 10px;
        }
        #shootBtn:active { background-color: #da190b; box-shadow: none; transform: translateY(4px); }
        #shootBtn:disabled { background-color: #555; border-color: #333; box-shadow: none; color: #888; transform: none; }

        .btn-secondary { background-color: #333; font-size: clamp(12px, 1.5vh, 14px); }

        #scoreBoard { font-size: clamp(20px, 3.5vh, 32px); font-weight: bold; text-align: center; color: #00FFFF; text-shadow: 0 0 10px rgba(0, 255, 255, 0.3); margin-bottom: 5px; }
        #diagBoard { font-size: clamp(12px, 2vh, 16px); text-align: center; color: #FFD700; margin-bottom: 15px; min-height: 4vh;}

        .legend { font-size: clamp(10px, 1.2vh, 12px); color: #888; display: flex; gap: 10px; margin-top: 5px; justify-content: center; }
        .legend span { display: flex; align-items: center; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

        @media (orientation: portrait) {
            body::before {
                content: "Rotera till liggande läge!"; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: #b71c1c; color: white; display: flex; align-items: center; justify-content: center; 
                font-size: 24px; font-weight: bold; text-align: center; z-index: 9999; padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="visuals-panel">
        <div class="view-container">
            <div class="view-title">Måltavla & Gruppering</div>
            <canvas id="frontCanvas" width="600" height="600"></canvas>
        </div>
        <div class="view-container">
            <div class="view-title">Profil & Avfyrningsanalys</div>
            <canvas id="sideCanvas" width="600" height="300"></canvas>
            <div class="legend">
                <span><div class="dot" style="background:#00FF00;"></div> Hold</span>
                <span><div class="dot" style="background:#FFD700;"></div> Trigger</span>
                <span><div class="dot" style="background:#00FFFF;"></div> Träff</span>
                <span><div class="dot" style="background:#555;"></div> Historik</span>
            </div>
        </div>
    </div>

    <div id="controls-panel">
        <div id="scoreBoard">REDO</div>
        <div id="diagBoard">Starta för att börja</div>
        <div class="controls">
            <button id="startBtn">Kalibrera & Starta</button>
            <button id="standbyBtn">STANDBY (Par Timer)</button>
            <button id="swapAxisBtn" class="btn-secondary">Byt Sensor-axlar</button>
        </div>
        <button id="shootBtn">AVFYRA</button>
    </div>

    <script>
        // --- HELSKÄRM ---
        function requestFullscreen() {
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) docEl.requestFullscreen().catch(()=>{});
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        }

        // --- AUDIO (SKOTT & PIP) ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playShot() {
            if (!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1200, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start(); noise.stop(audioCtx.currentTime + 0.2);
        }
        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // --- VARIABLER & SETUP ---
        const cFront = document.getElementById('frontCanvas'), ctxF = cFront.getContext('2d');
        const cSide = document.getElementById('sideCanvas'), ctxS = cSide.getContext('2d');
        const btnStart = document.getElementById('startBtn'), btnShoot = document.getElementById('shootBtn');
        const btnStandby = document.getElementById('standbyBtn'), btnSwap = document.getElementById('swapAxisBtn');
        const elScore = document.getElementById('scoreBoard'), elDiag = document.getElementById('diagBoard');

        let isAiming = false, trace = [], shotHistory = [];
        let startAlpha = null, startBeta = null, startGamma = null;
        let swapAxes = false;
        
        let rawX = cFront.width / 2, rawY = cFront.height / 2; // Rå sensordata
        let currentX = rawX, currentY = rawY; // Sensordata + Andning
        
        let beepTime = 0, standbyTimer = null;
        const sens = cFront.width / 20, TIME_WINDOW = 3000;

        // --- RITNING ---
        function drawTargetFront() {
            ctxF.clearRect(0, 0, cFront.width, cFront.height);
            const cX = cFront.width / 2, cY = cFront.height / 2;
            
            // Tavla
            for (let i = 5; i > 0; i--) {
                ctxF.beginPath(); ctxF.arc(cX, cY, i * (cFront.width/12), 0, 2 * Math.PI);
                ctxF.fillStyle = i % 2 === 0 ? '#111' : '#bb2222';
                ctxF.fill(); ctxF.lineWidth = 2; ctxF.strokeStyle = '#000'; ctxF.stroke();
            }

            // Historik (Gruppering)
            ctxF.fillStyle = 'rgba(255, 255, 255, 0.4)';
            shotHistory.forEach(shot => {
                ctxF.beginPath(); ctxF.arc(shot.x, shot.y, 8, 0, 2 * Math.PI); ctxF.fill();
            });

            // Spår
            if (trace.length < 2) return;
            const now = isAiming ? Date.now() : trace[trace.length - 1].time;
            ctxF.lineWidth = 5;
            for (let i = 1; i < trace.length; i++) {
                const p1 = trace[i-1], p2 = trace[i];
                ctxF.beginPath(); ctxF.moveTo(p1.x, p1.y); ctxF.lineTo(p2.x, p2.y);
                ctxF.strokeStyle = (now - p2.time < 500 && !isAiming) ? '#FFD700' : '#00FF00';
                ctxF.stroke();
            }

            // Nuvarande / Träff
            ctxF.beginPath(); 
            ctxF.arc(isAiming ? currentX : trace[trace.length-1].x, isAiming ? currentY : trace[trace.length-1].y, 10, 0, 2 * Math.PI);
            ctxF.fillStyle = isAiming ? 'white' : '#00FFFF'; ctxF.fill();
        }

        function drawTargetSide() {
            ctxS.clearRect(0, 0, cSide.width, cSide.height);
            const cY = cSide.height / 2, gap = cSide.height / 4;
            
            ctxS.lineWidth = 4; ctxS.strokeStyle = '#bb2222';
            ctxS.beginPath(); ctxS.moveTo(0, cY); ctxS.lineTo(cSide.width, cY); ctxS.stroke();
            ctxS.strokeStyle = '#333';
            ctxS.beginPath(); ctxS.moveTo(0, cY - gap); ctxS.lineTo(cSide.width, cY - gap); ctxS.stroke();
            ctxS.beginPath(); ctxS.moveTo(0, cY + gap); ctxS.lineTo(cSide.width, cY + gap); ctxS.stroke();

            if (trace.length < 2) return;
            const refTime = isAiming ? Date.now() : trace[trace.length - 1].time;
            ctxS.lineWidth = 5;
            
            for (let i = 1; i < trace.length; i++) {
                const p1 = trace[i-1], p2 = trace[i];
                if (refTime - p2.time > TIME_WINDOW) continue; 
                const x1 = cSide.width - ((refTime - p1.time) / TIME_WINDOW) * cSide.width;
                const x2 = cSide.width - ((refTime - p2.time) / TIME_WINDOW) * cSide.width;
                const y1 = cY + (p1.y - cFront.height / 2);
                const y2 = cY + (p2.y - cFront.height / 2);
                ctxS.beginPath(); ctxS.moveTo(x1, y1); ctxS.lineTo(x2, y2);
                ctxS.strokeStyle = (refTime - p2.time < 500 && !isAiming) ? '#FFD700' : '#00FF00';
                ctxS.stroke();
            }
        }

        function updateScreen() {
            // Lägg till andnings-svaj (långsam rörelse)
            const swayX = Math.sin(Date.now() / 1500) * (cFront.width * 0.03);
            const swayY = Math.sin(Date.now() / 1200) * (cFront.height * 0.03);
            currentX = rawX + swayX; 
            currentY = rawY + swayY;

            drawTargetFront(); drawTargetSide();
            
            if (isAiming) {
                trace.push({ x: currentX, y: currentY, time: Date.now() });
                if (trace.length > 200) trace.shift(); 
                requestAnimationFrame(updateScreen);
            }
        }

        function handleOrientation(e) {
            if (!isAiming) return;
            let a = e.alpha, b = e.beta, g = e.gamma;
            if (startAlpha === null) { startAlpha = a; startBeta = b; startGamma = g; }
            let dAlpha = a - startAlpha;
            if (dAlpha > 180) dAlpha -= 360; if (dAlpha < -180) dAlpha += 360;
            
            let dX = swapAxes ? g - startGamma : dAlpha;
            let dY = swapAxes ? a - startAlpha : b - startBeta;
            
            rawX = (cFront.width / 2) + (dX * sens);
            rawY = (cFront.height / 2) - (dY * sens);
            rawX = Math.max(0, Math.min(cFront.width, rawX));
            rawY = Math.max(0, Math.min(cFront.height, rawY));
        }

        // --- DIAGNOSTIK ---
        function analyzeShot() {
            if (trace.length < 10) return "För kort sikt-tid för analys.";
            const hitTime = trace[trace.length-1].time;
            const triggerPoints = trace.filter(p => hitTime - p.time < 500); // Sista 0.5 sek
            if(triggerPoints.length < 5) return "Stadigt skott!";

            const startTrigger = triggerPoints[0];
            const endTrigger = triggerPoints[triggerPoints.length-1];
            
            const diffX = endTrigger.x - startTrigger.x;
            const diffY = endTrigger.y - startTrigger.y;
            
            if (diffY > 40) return "⚠️ Dippar pipan! (Föregriper rekyl)";
            if (diffY < -40) return "⚠️ Lyfter pipan vid avfyrning.";
            if (diffX > 40) return "⚠️ Drar skottet till höger. (För mycket finger?)";
            if (diffX < -40) return "⚠️ Trycker skottet till vänster. (Rycker avtryckare)";
            
            return "✅ Mycket bra och stadig avfyrning!";
        }

        // --- KNAPPAR ---
        btnStart.addEventListener('click', async () => {
            requestFullscreen(); initAudio();
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    if (await DeviceOrientationEvent.requestPermission() !== 'granted') return alert('Behöver sensor!');
                } catch(e) {}
            }
            startMode();
        });

        btnStandby.addEventListener('click', () => {
            initAudio();
            btnStandby.style.display = 'none'; btnStart.style.display = 'none'; btnSwap.style.display = 'none';
            btnShoot.style.display = 'block'; btnShoot.innerText = 'VÄNTA...'; btnShoot.disabled = true;
            elScore.innerText = "STANDBY"; elDiag.innerText = "Gör dig redo...";
            
            // Random tid 2 - 5 sekunder
            const delay = 2000 + Math.random() * 3000;
            standbyTimer = setTimeout(() => {
                playBeep();
                beepTime = Date.now();
                btnShoot.innerText = 'AVFYRA!';
                btnShoot.disabled = false;
                startMode(true); // Starta loggningen när pipet går
            }, delay);
        });

        btnSwap.addEventListener('click', () => { swapAxes = !swapAxes; alert(swapAxes ? "Sidoläge" : "Upprätt"); });

        function startMode(fromStandby = false) {
            startAlpha = null; trace = []; isAiming = true;
            if(!fromStandby) {
                elScore.innerText = "SIKTAR..."; elDiag.innerText = "Fokusera på kornet...";
                btnStart.style.display = 'none'; btnStandby.style.display = 'none'; btnSwap.style.display = 'none';
                btnShoot.style.display = 'block'; btnShoot.innerText = 'AVFYRA'; btnShoot.disabled = false;
            }
            window.addEventListener('deviceorientation', handleOrientation);
            updateScreen();
        }

        btnShoot.addEventListener('click', () => {
            if(btnShoot.disabled) return;
            if ("vibrate" in navigator) navigator.vibrate(80); 
            playShot(); 
            isAiming = false; window.removeEventListener('deviceorientation', handleOrientation);
            
            const hit = trace[trace.length - 1];
            if(hit) {
                shotHistory.push({x: hit.x, y: hit.y});
                const dist = Math.sqrt(Math.pow(hit.x - cFront.width/2, 2) + Math.pow(hit.y - cFront.height/2, 2));
                elScore.innerText = `POÄNG: ${Math.max(0, 100 - (dist/(cFront.width/2))*100).toFixed(1)}`;
                
                let diag = analyzeShot();
                if (beepTime > 0) { // Om vi använde par timern
                    const reaction = ((Date.now() - beepTime) / 1000).toFixed(2);
                    diag = `Reaktion: ${reaction} sek | ${diag}`;
                    beepTime = 0; // Återställ
                }
                elDiag.innerText = diag;
            }

            btnStart.style.display = 'block'; btnStart.innerText = 'Ladda om';
            btnStandby.style.display = 'block'; btnSwap.style.display = 'block'; 
            btnShoot.style.display = 'none';
            drawTargetFront(); drawTargetSide(); 
        });

        drawTargetFront(); drawTargetSide();
    </script>
</body>
</html>
