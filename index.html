<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Banan-Simulator AR</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        
        /* UI Overlay som visas ovanpå AR-kameran */
        #overlay-ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            pointer-events: none; /* Låter klick passera igenom till AR-scenen */
            z-index: 10;
        }

        #header { padding: 20px; text-align: center; color: white; background: rgba(0,0,0,0.5); }
        #scoreBoard { font-size: 24px; font-weight: bold; }
        
        #footer {
            margin-top: auto; /* Trycker ner foten */
            padding: 20px;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.5);
            pointer-events: auto; /* Aktivera klick för knappar här */
        }

        #ar-instructions { color: #aaa; font-size: 14px; margin-top: 5px;}
    </style>
</head>
<body>

    <div id="overlay-ui">
        <div id="header">
            <div>WebXR AR-Simulator</div>
            <div id="scoreBoard">Redo (Kräver HTTPS)</div>
        </div>
        <div id="footer">
            <div id="ar-instructions">Sikta med telefonen och tryck på skärmen för att skjuta.</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.150.1/build/three.module.js';
        import { ARButton } from 'https://unpkg.com/three@0.150.1/examples/jsm/webxr/ARButton.js';

        let camera, scene, renderer, target;
        let controller;
        let raycaster;
        let audioCtx;
        const scoreBoard = document.getElementById('scoreBoard');

        // Hjälpmatriser för Raycasting
        const tempMatrix = new THREE.Matrix4();
        const rayDirection = new THREE.Vector3();

        init();
        animate();

        function init() {
            // --- 1. Grundläggande Three.js Setup ---
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Belysning (krävs för att 3D-objekt ska synas bra)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(0, 10, 0);
            scene.add(directionalLight);

            // Renderer med XR aktiverat
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // VIKTIGT: Aktivera XR
            document.body.appendChild(renderer.domElement);

            // --- 2. Skapa den virtuella Måltavlan (3D) ---
            // Vi skapar en platt disc (Cylinder med liten höjd)
            const geometry = new THREE.CylinderGeometry(0.3, 0.3, 0.02, 32);
            // Enkel röd färg (byt mot textur senare om du vill)
            const material = new THREE.MeshStandardMaterial({ color: 0xff3333, metalness: 0.3, roughness: 0.6 });
            target = new THREE.Mesh(geometry, material);
            
            // Rotera så framsidan pekar mot kameran
            target.rotation.x = Math.PI / 2;
            
            // Placera den 2 meter framför startpunkten (negativ Z) och 1.5m upp
            target.position.set(0, 1.5, -2); 
            scene.add(target);

            // --- 3. Lägg till AR-startknappen ---
            // Vi skickar med vårt UI-overlay så det visas i AR
            const overlay = document.getElementById('overlay-ui');
            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'], // Hit-test behövs om vi vill placera på golvet senare
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: overlay } 
            }));

            // --- 4. Setup för Skjutning (Input & Raycasting) ---
            raycaster = new THREE.Raycaster();

            // WebXR hanterar input (skärmtryck) via controllers
            controller = renderer.xr.getController(0);
            // Registrera 'select' eventet (klick på skärmen)
            controller.addEventListener('select', onShoot);
            scene.add(controller);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 5. Ljudsyntes (Kopia från tidigare) ---
        function playSyntheticShot() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const bufferSize = audioCtx.sampleRate * 0.3; // 0.3 sekunder
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime); // Lite lägre volym
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);

            noise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            noise.start();
            noise.stop(audioCtx.currentTime + 0.15);
        }

        // --- 6. Skjut-logik (Raycasting i 3D) ---
        function onShoot() {
            playSyntheticShot(); // Spela ljud direkt

            // WebXR 'select'-eventet garanterar en giltig rörelse-gesture,
            // så vi kan starta AudioContext här.
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            // Uppdatera Raycaster baserat på telefonens (kontrollerns) position och riktning
            tempMatrix.extractRotation(controller.matrixWorld);
            rayDirection.set(0, 0, -1).applyMatrix4(tempMatrix); // "Framåt" är negativ Z
            
            raycaster.set(controller.position, rayDirection);

            // Beräkna om vi krockar med måltavlan
            const intersects = raycaster.intersectObject(target);

            if (intersects.length > 0) {
                // TRÄFF!
                scoreBoard.innerText = "TRÄFF!";
                scoreBoard.style.color = "#4CAF50"; // Grön
                
                // Enkel visuell feedback: Gör tavlan grön en kort stund
                target.material.color.setHex(0x00ff00);
                setTimeout(() => { target.material.color.setHex(0xff3333); }, 200);

            } else {
                // BOM!
                scoreBoard.innerText = "BOM!";
                scoreBoard.style.color = "#f44336"; // Röd
            }
        }

        // --- 7. Animations-loop (VIKTIGT för WebXR) ---
        function animate() {
            // I WebXR måste vi använda renderer.setAnimationLoop, inte requestAnimationFrame
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            // Om vi är i en AR-session, rotera tavlan sakta
            if (renderer.xr.isPresenting) {
                 target.rotation.z += 0.005; // Snurrar tavlan
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
