<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>Mantis-Klonen Ultimate</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0; background-color: #121212; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: row; 
            height: 100dvh; /* 100dvh hanterar mobila webbläsares menyer bättre än vh */
            width: 100vw; overflow: hidden;
            user-select: none; -webkit-user-select: none;
            overscroll-behavior: none; /* Förhindrar pull-to-refresh */
        }

        /* Vänstra panelen (Visualisering) */
        #visuals-panel { 
            flex: 1.2; /* Tar upp ca 55% av skärmen */
            display: flex; flex-direction: column; 
            align-items: center; justify-content: space-evenly; 
            padding: 10px; background-color: #1a1a1a;
            border-right: 2px solid #333;
            max-width: 60vw; 
        }

        .view-container {
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; width: 100%; height: 48%; /* Tar upp hälften var */
        }

        .view-title {
            font-size: clamp(10px, 1.5vh, 14px); color: #aaa; margin-bottom: 5px; 
            text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;
        }

        canvas { 
            background-color: #252525; border-radius: 12px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 4px 8px rgba(0,0,0,0.3);
            /* Dessa gör att canvasen skalar ner automatiskt utan att tappa proportioner */
            max-width: 100%; max-height: calc(100% - 20px);
            object-fit: contain; 
        }

        /* Högra panelen (Kontroller) */
        #controls-panel { 
            flex: 1; display: flex; flex-direction: column; padding: 15px; 
            background-color: #121212; justify-content: center; align-items: stretch;
        }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; flex-shrink: 0;}
        
        button { 
            background-color: #4CAF50; color: white; border: none; 
            padding: clamp(10px, 2vh, 20px); font-size: clamp(14px, 2vh, 18px); 
            border-radius: 8px; font-weight: bold;
            cursor: pointer; touch-action: manipulation; transition: 0.1s;
        }
        button:active { transform: scale(0.97); }

        #shootBtn { 
            background-color: #f44336; display: none; flex-grow: 1; 
            font-size: clamp(24px, 4vh, 40px); border-radius: 15px; border: 4px solid #b71c1c;
            box-shadow: 0 8px 15px rgba(244, 67, 54, 0.4); margin-top: 10px;
        }
        #shootBtn:active { background-color: #da190b; box-shadow: none; transform: translateY(4px); }

        .btn-secondary { background-color: #444; font-size: clamp(12px, 1.5vh, 14px); }

        #scoreBoard { 
            font-size: clamp(20px, 3.5vh, 32px); font-weight: bold; text-align: center; 
            margin-bottom: 15px; color: #00FFFF; text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            flex-shrink: 0;
        }

        .legend {
            font-size: clamp(10px, 1.2vh, 12px); color: #888; display: flex; gap: 10px; 
            margin-top: 5px; justify-content: center; flex-shrink: 0;
        }
        .legend span { display: flex; align-items: center; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

        /* Varning om man håller telefonen stående */
        @media (orientation: portrait) {
            body::before {
                content: "Vänligen rotera telefonen till liggande läge!";
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: #b71c1c; color: white; display: flex; align-items: center; 
                justify-content: center; font-size: 24px; font-weight: bold; text-align: center;
                z-index: 9999; padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="visuals-panel">
        <div class="view-container">
            <div class="view-title">Framsida - Måltavla</div>
            <canvas id="frontCanvas" width="600" height="600"></canvas>
        </div>
        <div class="view-container">
            <div class="view-title">Sidan - Höjdled över tid</div>
            <canvas id="sideCanvas" width="600" height="300"></canvas>
            <div class="legend">
                <span><div class="dot" style="background:#00FF00;"></div> Sikte</span>
                <span><div class="dot" style="background:#FFD700;"></div> Avfyrning</span>
                <span><div class="dot" style="background:#00FFFF;"></div> Träff</span>
            </div>
        </div>
    </div>

    <div id="controls-panel">
        <div id="scoreBoard">REDO</div>
        <div class="controls">
            <button id="startBtn">Kalibrera & Starta (Helskärm)</button>
            <button id="swapAxisBtn" class="btn-secondary">Rör det sig fel? Byt axlar</button>
        </div>
        <button id="shootBtn">AVFYRA</button>
    </div>

    <script>
        // --- HELSKÄRM & LÅSNING AV ROTATION ---
        function requestFullscreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            const requestFS = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            if (requestFS && !doc.fullscreenElement) {
                requestFS.call(docEl).catch(err => { console.log(`Kunde inte aktivera helskärm: ${err.message}`); });
            }
            // Försök låsa skärmen i landskapsläge (fungerar främst på Android)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => console.log("Låsning av skärmorientering stöds inte."));
            }
        }

        // --- LJUD SYNTES ---
        let audioCtx = null;
        function playSyntheticShot() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            noise.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
            noise.start(); noise.stop(audioCtx.currentTime + 0.2);
        }

        const canvasFront = document.getElementById('frontCanvas');
        const ctxFront = canvasFront.getContext('2d');
        const canvasSide = document.getElementById('sideCanvas');
        const ctxSide = canvasSide.getContext('2d');
        
        const startBtn = document.getElementById('startBtn');
        const shootBtn = document.getElementById('shootBtn');
        const swapAxisBtn = document.getElementById('swapAxisBtn');
        const scoreBoard = document.getElementById('scoreBoard');

        let isAiming = false;
        let trace = [];
        let startAlpha = null, startBeta = null, startGamma = null;
        let currentX = canvasFront.width / 2, currentY = canvasFront.height / 2;
        let swapAxes = false; 
        
        // Känsligheten är nu dynamisk baserat på upplösningen
        const sensitivity = canvasFront.width / 20; 
        const TIME_WINDOW = 3000; 

        function drawFront() {
            ctxFront.clearRect(0, 0, canvasFront.width, canvasFront.height);
            const cX = canvasFront.width / 2, cY = canvasFront.height / 2;
            
            // Justera storleken på ringarna efter den nya upplösningen
            for (let i = 5; i > 0; i--) {
                ctxFront.beginPath(); ctxFront.arc(cX, cY, i * (canvasFront.width/12), 0, 2 * Math.PI);
                ctxFront.fillStyle = i % 2 === 0 ? '#eeeeee' : '#dd3333';
                ctxFront.fill(); ctxFront.lineWidth = 4; ctxFront.strokeStyle = '#222'; ctxFront.stroke();
            }
            if (trace.length < 2) return;
            const now = isAiming ? Date.now() : trace[trace.length - 1].time;
            ctxFront.lineWidth = 6;
            for (let i = 1; i < trace.length; i++) {
                const p1 = trace[i-1], p2 = trace[i];
                ctxFront.beginPath(); ctxFront.moveTo(p1.x, p1.y); ctxFront.lineTo(p2.x, p2.y);
                ctxFront.strokeStyle = (now - p2.time < 500 && !isAiming) ? '#FFD700' : '#00FF00';
                ctxFront.stroke();
            }
            if (!isAiming) {
                const lastPoint = trace[trace.length - 1];
                ctxFront.beginPath(); ctxFront.arc(lastPoint.x, lastPoint.y, 12, 0, 2 * Math.PI);
                ctxFront.fillStyle = '#00FFFF'; ctxFront.fill();
            } else {
                ctxFront.beginPath(); ctxFront.arc(currentX, currentY, 10, 0, 2 * Math.PI);
                ctxFront.fillStyle = 'white'; ctxFront.fill();
            }
        }

        function drawSide() {
            ctxSide.clearRect(0, 0, canvasSide.width, canvasSide.height);
            const cY = canvasSide.height / 2;
            ctxSide.lineWidth = 4; ctxSide.strokeStyle = '#dd3333';
            ctxSide.beginPath(); ctxSide.moveTo(0, cY); ctxSide.lineTo(canvasSide.width, cY); ctxSide.stroke();
            ctxSide.strokeStyle = '#555';
            
            const gap = canvasSide.height / 4;
            ctxSide.beginPath(); ctxSide.moveTo(0, cY - gap); ctxSide.lineTo(canvasSide.width, cY - gap); ctxSide.stroke();
            ctxSide.beginPath(); ctxSide.moveTo(0, cY + gap); ctxSide.lineTo(canvasSide.width, cY + gap); ctxSide.stroke();

            if (trace.length < 2) return;
            const refTime = isAiming ? Date.now() : trace[trace.length - 1].time;
            ctxSide.lineWidth = 6;
            for (let i = 1; i < trace.length; i++) {
                const p1 = trace[i-1], p2 = trace[i];
                if (refTime - p2.time > TIME_WINDOW) continue; 
                const x1 = canvasSide.width - ((refTime - p1.time) / TIME_WINDOW) * canvasSide.width;
                const x2 = canvasSide.width - ((refTime - p2.time) / TIME_WINDOW) * canvasSide.width;
                const y1 = cY + (p1.y - canvasFront.height / 2);
                const y2 = cY + (p2.y - canvasFront.height / 2);
                ctxSide.beginPath(); ctxSide.moveTo(x1, y1); ctxSide.lineTo(x2, y2);
                ctxSide.strokeStyle = (refTime - p2.time < 500 && !isAiming) ? '#FFD700' : '#00FF00';
                ctxSide.stroke();
            }
            if (!isAiming) {
                const lastP = trace[trace.length - 1];
                const hitX = canvasSide.width; 
                const hitY = cY + (lastP.y - canvasFront.height / 2);
                ctxSide.beginPath(); ctxSide.arc(hitX, hitY, 12, 0, 2 * Math.PI);
                ctxSide.fillStyle = '#00FFFF'; ctxSide.fill();
            }
        }

        function updateScreen() {
            drawFront(); drawSide();
            if (isAiming) {
                trace.push({ x: currentX, y: currentY, time: Date.now() });
                if (trace.length > 250) trace.shift(); 
                requestAnimationFrame(updateScreen);
            }
        }

        function handleOrientation(event) {
            if (!isAiming) return;
            let alpha = event.alpha, beta = event.beta, gamma = event.gamma;
            if (startAlpha === null) { startAlpha = alpha; startBeta = beta; startGamma = gamma; }
            let deltaAlpha = alpha - startAlpha;
            if (deltaAlpha > 180) deltaAlpha -= 360; if (deltaAlpha < -180) deltaAlpha += 360;
            let deltaX = swapAxes ? gamma - startGamma : deltaAlpha;
            let deltaY = swapAxes ? alpha - startAlpha : beta - startBeta;
            currentX = (canvasFront.width / 2) + (deltaX * sensitivity);
            currentY = (canvasFront.height / 2) - (deltaY * sensitivity);
            currentX = Math.max(0, Math.min(canvasFront.width, currentX));
            currentY = Math.max(0, Math.min(canvasFront.height, currentY));
        }

        startBtn.addEventListener('click', async () => {
            // Aktivera helskärm och ev. lås skärmorientering
            requestFullscreen();

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission !== 'granted') { alert('Sensoråtkomst nekad!'); return; }
                } catch (e) { console.error(e); }
            }
            startAlpha = null; trace = []; isAiming = true;
            scoreBoard.innerText = "SIKTAR...";
            startBtn.style.display = 'none'; swapAxisBtn.style.display = 'none'; shootBtn.style.display = 'block';
            window.addEventListener('deviceorientation', handleOrientation);
            updateScreen();
        });

        swapAxisBtn.addEventListener('click', () => { 
            swapAxes = !swapAxes; 
            alert(swapAxes ? "Axlar bytta för montering på sidan." : "Axlar återställda."); 
        });

        shootBtn.addEventListener('click', () => {
            if ("vibrate" in navigator) navigator.vibrate(80); 
            playSyntheticShot(); 
            isAiming = false;
            window.removeEventListener('deviceorientation', handleOrientation);
            
            startBtn.style.display = 'block'; startBtn.innerText = 'Ladda om & Skjut igen';
            swapAxisBtn.style.display = 'block'; shootBtn.style.display = 'none';
            
            const cX = canvasFront.width / 2, cY = canvasFront.height / 2;
            const lastPoint = trace[trace.length - 1];
            if(lastPoint) {
                const dist = Math.sqrt(Math.pow(lastPoint.x - cX, 2) + Math.pow(lastPoint.y - cY, 2));
                // Uppdaterad poängberäkning pga ny högre upplösning
                const maxDist = canvasFront.width / 2;
                scoreBoard.innerText = `POÄNG: ${Math.max(0, 100 - (dist/maxDist)*100).toFixed(1)}`;
            }
            drawFront(); drawSide(); 
        });

        drawFront(); drawSide();
    </script>
</body>
</html>
