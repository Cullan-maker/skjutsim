<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Banan-Simulatorn Pro (Syntetiskt Ljud)</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #121212; color: #ffffff;
            font-family: sans-serif; display: flex; flex-direction: row;
            height: 100vh; width: 100vw; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }
        #left-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        #right-panel { flex: 1; display: flex; flex-direction: column; padding: 10px; }
        canvas { background-color: #2a2a2a; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); max-height: 90vh; max-width: 100%; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
        button { background-color: #4CAF50; color: white; border: none; padding: 15px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; touch-action: manipulation; }
        #shootBtn { background-color: #f44336; display: none; flex-grow: 1; font-size: 32px; font-weight: bold; border-radius: 15px; border: 4px solid #b71c1c; }
        #shootBtn:active { background-color: #da190b; }
        .btn-secondary { background-color: #555; font-size: 14px; padding: 10px; }
        #scoreBoard { font-size: 24px; font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="left-panel">
        <canvas id="targetCanvas" width="300" height="300"></canvas>
        <div id="scoreBoard">Redo</div>
    </div>

    <div id="right-panel">
        <div class="controls">
            <button id="startBtn">Kalibrera & Aktivera Ljud</button>
            <button id="swapAxisBtn" class="btn-secondary">Byt axlar</button>
        </div>
        <button id="shootBtn">AVFYRA</button>
    </div>

    <script>
        // --- WEBAUDIO SYNTETISERING (NYTT) ---
        let audioCtx = null;

        function playSyntheticShot() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 1. Skapa vitt brus (själva "smällen")
            const bufferSize = audioCtx.sampleRate * 0.5; // 0.5 sekunder
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            // 2. Filter för att göra ljudet dovare (mer som ett skott, mindre som statiskt brus)
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);

            // 3. Volymkurva (Envelope) - Startar högt och dör ut snabbt
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

            // Koppla ihop allt: Brus -> Filter -> Volym -> Högtalare
            noise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            noise.start();
            noise.stop(audioCtx.currentTime + 0.2);
        }

        // --- RESTEN AV SIMULATOR-LOGIKEN ---
        const canvas = document.getElementById('targetCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const shootBtn = document.getElementById('shootBtn');
        const swapAxisBtn = document.getElementById('swapAxisBtn');
        const scoreBoard = document.getElementById('scoreBoard');

        let isAiming = false;
        let trace = [];
        let startAlpha = null, startBeta = null, startGamma = null;
        let currentX = canvas.width / 2, currentY = canvas.height / 2;
        let swapAxes = false; 
        const sensitivity = 10; 

        function drawTarget() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2, centerY = canvas.height / 2;
            for (let i = 5; i > 0; i--) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, i * 25, 0, 2 * Math.PI);
                ctx.fillStyle = i % 2 === 0 ? '#eeeeee' : '#dd3333';
                ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = '#222'; ctx.stroke();
            }
        }

        function drawTrace() {
            if (trace.length < 2) return;
            const now = Date.now();
            ctx.lineWidth = 3;
            for (let i = 1; i < trace.length; i++) {
                const point = trace[i], prevPoint = trace[i-1];
                ctx.beginPath();
                ctx.moveTo(prevPoint.x, prevPoint.y);
                ctx.lineTo(point.x, point.y);
                ctx.strokeStyle = (now - point.time < 500 && !isAiming) ? '#FFD700' : '#00FF00';
                ctx.stroke();
            }
            if (!isAiming) {
                const lastPoint = trace[trace.length - 1];
                ctx.beginPath(); ctx.arc(lastPoint.x, lastPoint.y, 6, 0, 2 * Math.PI);
                ctx.fillStyle = '#00FFFF'; ctx.fill();
            }
        }

        function updateScreen() {
            drawTarget();
            if (isAiming) {
                trace.push({ x: currentX, y: currentY, time: Date.now() });
                if (trace.length > 150) trace.shift(); 
                ctx.beginPath(); ctx.arc(currentX, currentY, 5, 0, 2 * Math.PI);
                ctx.fillStyle = 'white'; ctx.fill();
            }
            drawTrace();
            if (isAiming) requestAnimationFrame(updateScreen);
        }

        function handleOrientation(event) {
            if (!isAiming) return;
            let alpha = event.alpha, beta = event.beta, gamma = event.gamma;
            if (startAlpha === null) { startAlpha = alpha; startBeta = beta; startGamma = gamma; }
            let deltaAlpha = alpha - startAlpha;
            if (deltaAlpha > 180) deltaAlpha -= 360; if (deltaAlpha < -180) deltaAlpha += 360;
            let deltaX = swapAxes ? gamma - startGamma : deltaAlpha;
            let deltaY = swapAxes ? alpha - startAlpha : beta - startBeta;
            currentX = (canvas.width / 2) + (deltaX * sensitivity);
            currentY = (canvas.height / 2) - (deltaY * sensitivity);
            currentX = Math.max(0, Math.min(canvas.width, currentX));
            currentY = Math.max(0, Math.min(canvas.height, currentY));
        }

        startBtn.addEventListener('click', async () => {
            // Starta AudioContext på klick
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission !== 'granted') return;
                } catch (e) { console.error(e); }
            }
            startAlpha = null; trace = []; isAiming = true;
            scoreBoard.innerText = "Siktar...";
            startBtn.style.display = 'none'; swapAxisBtn.style.display = 'none'; shootBtn.style.display = 'block';
            window.addEventListener('deviceorientation', handleOrientation);
            updateScreen();
        });

        swapAxisBtn.addEventListener('click', () => { swapAxes = !swapAxes; });

        shootBtn.addEventListener('click', () => {
            playSyntheticShot(); // SPELA DET SYNTETISKA LJUDET
            isAiming = false;
            window.removeEventListener('deviceorientation', handleOrientation);
            startBtn.style.display = 'block'; startBtn.innerText = 'Skjut igen';
            swapAxisBtn.style.display = 'block'; shootBtn.style.display = 'none';
            const centerX = canvas.width / 2, centerY = canvas.height / 2;
            const lastPoint = trace[trace.length - 1];
            if(lastPoint) {
                const dist = Math.sqrt(Math.pow(lastPoint.x - centerX, 2) + Math.pow(lastPoint.y - centerY, 2));
                scoreBoard.innerText = `Träff: ${Math.max(0, 100 - (dist/1.5)).toFixed(1)} / 100`;
            }
        });

        drawTarget();
    </script>
</body>
</html>
