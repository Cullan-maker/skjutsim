<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>Mantis-Klonen v1.5.0</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background-color: #050505; color: #ffffff;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: row; 
            height: 100dvh; width: 100vw; overflow: hidden;
        }

        #visuals-panel { 
            flex: 1.3; display: flex; flex-direction: column; align-items: center; 
            justify-content: space-evenly; padding: 10px; background-color: #111;
            border-right: 2px solid #333; position: relative;
        }

        .view-container { display: flex; flex-direction: column; align-items: center; width: 100%; height: 48%; }
        canvas { 
            background-color: #1a1a1a; border-radius: 8px; border: 1px solid #333;
            max-width: 100%; max-height: 85%; object-fit: contain; 
        }

        #controls-panel { 
            flex: 1; display: flex; flex-direction: column; padding: 20px; 
            background-color: #050505; justify-content: center;
        }

        #scoreBoard { font-size: 32px; font-weight: bold; text-align: center; color: #00FFFF; margin-bottom: 5px; }
        
        #diagBoard { 
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid #ffd700;
            padding: 15px;
            border-radius: 10px;
            font-size: 17px;
            line-height: 1.4;
            text-align: center;
            color: #ffd700;
            margin-bottom: 20px;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(255,215,0,0.1);
        }

        button { 
            background-color: #2e7d32; color: white; border: none; 
            padding: 18px; font-size: 17px; border-radius: 10px; font-weight: bold;
            cursor: pointer; margin-bottom: 8px; transition: background 0.2s;
        }
        button:active { background-color: #1b5e20; }

        #shootBtn { 
            background-color: #c62828; display: none; flex-grow: 1; 
            font-size: 36px; border-radius: 20px; border-bottom: 5px solid #5d1111;
            margin-top: 5px;
        }
        #shootBtn:active { transform: translateY(3px); border-bottom: 2px solid #5d1111; }

        .legend { font-size: 11px; color: #666; display: flex; gap: 8px; margin-top: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        
        #version-tag {
            position: absolute; bottom: 5px; left: 10px; font-size: 10px; color: #444;
        }
    </style>
</head>
<body>

    <div id="visuals-panel">
        <div class="view-container">
            <canvas id="frontCanvas" width="600" height="600"></canvas>
        </div>
        <div class="view-container">
            <canvas id="sideCanvas" width="600" height="300"></canvas>
            <div class="legend">
                <span><div class="dot" style="background:#00FF00;"></div> Sikte</span>
                <span><div class="dot" style="background:#FFD700;"></div> Avfyrning</span>
                <span><div class="dot" style="background:#555;"></div> Grupp</span>
            </div>
        </div>
        <div id="version-tag">Build v1.5.0-smart-diag</div>
    </div>

    <div id="controls-panel">
        <div id="scoreBoard">VÄNTAR</div>
        <div id="diagBoard">Håll vapnet stilla och klicka på Start för att kalibrera sensorerna.</div>
        
        <button id="startBtn">KALIBRERA & STARTA</button>
        <button id="shootBtn">AVFYRA</button>
        <button id="swapBtn" style="background:#333; font-size: 13px;">BYT AXEL (Liggande/Stående)</button>
    </div>

    <script>
        const cFront = document.getElementById('frontCanvas'), ctxF = cFront.getContext('2d');
        const cSide = document.getElementById('sideCanvas'), ctxS = cSide.getContext('2d');
        const btnStart = document.getElementById('startBtn'), btnShoot = document.getElementById('shootBtn');
        const elScore = document.getElementById('scoreBoard'), elDiag = document.getElementById('diagBoard');

        let isAiming = false, trace = [], shotHistory = [], audioCtx = null;
        let startA = null, startB = null, startG = null, swap = false;
        let rawX = 300, rawY = 300;

        function bang() {
            if (!audioCtx) audioCtx = new (AudioContext || webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(160, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function getFeedback() {
            if (trace.length < 10) return "Analys misslyckades: För kort sikt-tid.";
            
            const hit = trace[trace.length - 1];
            const startTrigger = trace[Math.max(0, trace.length - 15)]; 
            
            const dX = hit.x - startTrigger.x;
            const dY = hit.y - startTrigger.y;
            const offX = hit.x - 300;
            const offY = hit.y - 300;

            let cause = [], result = [];

            // Analysera rörelse (Orsak)
            if (dY > 25) cause.push("dippade pipan");
            else if (dY < -25) cause.push("lyfte pipan");
            if (dX > 25) cause.push("drog åt höger");
            else if (dX < -25) cause.push("ryckte avtryckaren");

            // Analysera träffläge (Resultat)
            if (offY > 40) result.push("lågt");
            else if (offY < -40) result.push("högt");
            if (offX > 40) result.push("till vänster");
            else if (offX < -40) result.push("till höger");

            if (cause.length === 0 && result.length === 0) return "✅ Perfekt avfyrning, skottet satt mitt i prick!";
            
            const causeStr = cause.length > 0 
                ? cause.join(" och ").charAt(0).toUpperCase() + cause.join(" och ").slice(1) 
                : "Ostödigt sikte";
            const resultStr = result.length > 0 
                ? "skottet gick " + result.join(" och ") 
                : "men träffen blev ändå bra";

            return `⚠️ ANALYS: ${causeStr}, ${resultStr}.`;
        }

        function draw() {
            ctxF.clearRect(0,0,600,600); ctxS.clearRect(0,0,600,300);
            
            // Måltavla
            for(let i=5; i>0; i--) {
                ctxF.beginPath(); ctxF.arc(300,300, i*55, 0, 7);
                ctxF.fillStyle = i%2===0 ? '#0a0a0a' : '#b71c1c'; ctxF.fill();
                ctxF.strokeStyle = '#222'; ctxF.stroke();
            }

            // Historik
            shotHistory.forEach(s => { ctxF.fillStyle='rgba(100,100,100,0.6)'; ctxF.beginPath(); ctxF.arc(s.x,s.y,8,0,7); ctxF.fill(); });

            if (trace.length > 1) {
                ctxF.lineWidth = 5;
                for(let i=1; i<trace.length; i++) {
                    ctxF.strokeStyle = (Date.now()-trace[i].time < 500 && !isAiming) ? '#FFD700' : '#4CAF50';
                    ctxF.beginPath(); ctxF.moveTo(trace[i-1].x, trace[i-1].y); ctxF.lineTo(trace[i].x, trace[i].y); ctxF.stroke();
                }
            }

            const last = isAiming ? {x:rawX, y:rawY} : trace[trace.length-1];
            if(last) {
                ctxF.fillStyle = isAiming ? '#fff' : '#00FFFF';
                ctxF.beginPath(); ctxF.arc(last.x, last.y, 11, 0, 7); ctxF.fill();
                ctxF.strokeStyle = '#000'; ctxF.stroke();
            }

            if (isAiming) requestAnimationFrame(draw);
        }

        window.addEventListener('deviceorientation', e => {
            if(!isAiming) return;
            if(startA === null) { startA=e.alpha; startB=e.beta; startG=e.gamma; }
            let dx = swap ? e.gamma-startG : e.alpha-startA;
            if (dx > 180) dx -= 360; if (dx < -180) dx += 360;
            let dy = swap ? e.alpha-startA : e.beta-startB;
            rawX = 300 + (dx * 18); rawY = 300 - (dy * 18);
            trace.push({x:rawX, y:rawY, time:Date.now()});
            if(trace.length > 200) trace.shift();
        });

        btnStart.onclick = async () => {
            if (window.DeviceOrientationEvent?.requestPermission) await DeviceOrientationEvent.requestPermission();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            isAiming = true; startA = null; trace = [];
            elDiag.innerText = "SIKTAR... Tryck när du är redo!";
            elScore.innerText = "---";
            btnStart.style.display = 'none'; btnShoot.style.display = 'block';
            draw();
        };

        btnShoot.onclick = () => {
            isAiming = false;
            bang();
            if(navigator.vibrate) navigator.vibrate(80);

            const feedback = getFeedback();
            const hit = trace[trace.length-1];
            const dist = Math.sqrt(Math.pow(hit.x-300,2) + Math.pow(hit.y-300,2));
            const score = Math.max(0, 100 - (dist/3.2)).toFixed(1);

            elScore.innerText = `POÄNG: ${score}`;
            elDiag.innerText = feedback;
            shotHistory.push(hit);

            btnShoot.style.display = 'none';
            btnStart.style.display = 'block';
            btnStart.innerText = "LADDA OM (NÄSTA SKOTT)";
        };

        document.getElementById('swapBtn').onclick = () => { swap = !swap; alert("Axlarna är nu växlade!"); };
    </script>
</body>
</html>
