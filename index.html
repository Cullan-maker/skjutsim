<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
    <title>AR Pistol Simulator - Precision</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #fff;}
        
        #overlay-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; pointer-events: none; z-index: 10;
        }

        #header { 
            padding: 10px 20px; background: linear-gradient(rgba(0,0,0,0.9), transparent); 
            display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto;
        }
        
        .stat-box { background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; font-size: 16px; margin-bottom: 5px; border-left: 3px solid #555;}
        .stat-box span { font-weight: bold; font-size: 20px; color: #00ffff;}
        
        #statusBoard { font-size: 24px; font-weight: 900; color: #ffeb3b; text-shadow: 2px 2px 4px #000; text-align: center; flex-grow: 1; margin-top: 5px;}

        .controls { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        
        button.action-btn {
            background: #2e7d32; color: #fff; border: 2px solid #1b5e20; padding: 10px 15px;
            font-size: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 #1b5e20; pointer-events: auto;
        }
        button.action-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #1b5e20; }
        #place-btn { background: #ff9800; border-color: #e65100; box-shadow: 0 4px 0 #e65100; font-size: 18px; padding: 15px 25px; display: none; margin: auto;}
        
        /* Dynamiskt Glock Sikte */
        #glock-sight {
            position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
            width: 300px; height: 150px; pointer-events: none;
            display: flex; justify-content: center; align-items: flex-end;
        }
        /* Bakre siktet (skåran) - Fast på skärmen */
        .rear-sight {
            width: 180px; height: 70px; border: 35px solid #1a1a1a; border-top: none;
            position: absolute; bottom: 0; border-radius: 4px; box-shadow: inset 0 5px 15px rgba(0,0,0,0.8); z-index: 2;
        }
        /* Främre siktet (kornet) - Rör sig med gyrot! */
        .front-sight {
            width: 30px; height: 80px; background: #222; position: absolute; bottom: 20px;
            display: flex; justify-content: center; padding-top: 10px; border-radius: 3px 3px 0 0; 
            box-shadow: 0 -2px 5px rgba(0,0,0,0.5); z-index: 1; transition: transform 0.05s ease-out;
        }
        .white-dot { width: 16px; height: 16px; background: #fff; border-radius: 50%; box-shadow: 0 0 5px rgba(255,255,255,0.8); }

        #audio-status { position: absolute; bottom: 10px; left: 10px; font-size: 12px; color: #ffeb3b; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px;}
        
        /* Start-skärm */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color: #00ffff;">AR Precision-Simulator</h1>
        <p style="color: #aaa; margin-bottom: 20px;">Snurra telefonen till landskapsläge.<br>Håll struket korn för att träffa.</p>
        <button id="btn-start" class="action-btn" style="font-size: 20px; padding: 20px 40px;">STARTA SYSTEMET</button>
    </div>

    <div id="overlay-ui" style="display:none;">
        <div id="header">
            <div>
                <div class="stat-box">Träffar: <span id="hit-count">0</span></div>
            </div>
            
            <div id="statusBoard">SKANNA VÄGGEN</div>
            
            <div class="controls">
                <button id="clear-btn" class="action-btn" style="background: #d32f2f; border-color: #b71c1c; box-shadow: 0 4px 0 #b71c1c;">Rensa Tavla</button>
                <button id="move-btn" class="action-btn">Flytta Tavla</button>
            </div>
        </div>

        <button id="place-btn" class="action-btn">FÄST PÅ VÄGG</button>

        <div id="glock-sight">
            <div class="rear-sight"></div>
            <div class="front-sight" id="front-sight"><div class="white-dot"></div></div>
        </div>
        
        <div id="audio-status">Mic: VÄNTAR...</div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.150.1/build/three.module.js';

        let camera, scene, renderer, target, targetDecals;
        let reticle, hitTestSource = null, hitTestSourceRequested = false;
        let xrSession = null;
        let placingMode = true;
        let hits = 0;

        // Ljud & Avtryckare
        let audioContext, analyser, dataArray;
        let lastShotTime = 0;

        // Fysik för struket korn
        const frontSightEl = document.getElementById('front-sight');
        let sightOffsetX = 0, sightOffsetY = 0;
        let sightVelX = 0, sightVelY = 0;
        let lastCamRot = new THREE.Euler();

        const statusBoard = document.getElementById('statusBoard');
        const audioStatus = document.getElementById('audio-status');
        const placeBtn = document.getElementById('place-btn');
        const raycaster = new THREE.Raycaster();

        // --- Startsekvens & Helskärm ---
        document.getElementById('btn-start').addEventListener('click', async () => {
            try {
                if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
                if (screen.orientation && screen.orientation.lock) await screen.orientation.lock("landscape");
            } catch (err) {}

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                listenForTrigger();
                audioStatus.innerText = "Mic: AKTIV"; audioStatus.style.color = "#00e676";
            } catch(e) {
                audioStatus.innerText = "Mic: NEKAD"; audioStatus.style.color = "#ff1744";
            }

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('overlay-ui').style.display = 'flex';
            
            init3D();
            startAR();
        });

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            createSimpleTarget();
            createReticle();

            document.getElementById('clear-btn').addEventListener('click', () => {
                while(targetDecals.children.length > 0) targetDecals.remove(targetDecals.children[0]);
                hits = 0; document.getElementById('hit-count').innerText = 0;
                statusBoard.innerText = "TAVLA RENSAD";
            });

            document.getElementById('move-btn').addEventListener('click', () => {
                target.visible = false; placingMode = true; statusBoard.innerText = "SKANNA VÄGGEN";
            });

            // Placera på VÄGG (normal-logik)
            placeBtn.addEventListener('click', () => {
                if (reticle.visible) {
                    target.position.setFromMatrixPosition(reticle.matrix);
                    target.quaternion.setFromRotationMatrix(reticle.matrix);
                    
                    // När WebXR hittar en yta är Y-axeln normalen (pekar rakt ut från väggen).
                    // En PlaneGeometry byggs vänd mot Z. Vi roterar tavlan så Z pekar åt samma håll som Y.
                    target.rotateX(-Math.PI / 2);
                    
                    target.visible = true;
                    placingMode = false;
                    placeBtn.style.display = 'none';
                    statusBoard.innerText = "HÅLL STRUKET KORN";
                }
            });

            window.addEventListener('resize', onWindowResize);
            renderer.setAnimationLoop(render);
        }

        async function startAR() {
            if (navigator.xr) {
                const sessionInit = { requiredFeatures: ['hit-test'], optionalFeatures: ['dom-overlay'], domOverlay: { root: document.getElementById('overlay-ui') } };
                navigator.xr.requestSession('immersive-ar', sessionInit).then((session) => {
                    renderer.xr.setSession(session);
                    xrSession = session;
                });
            }
        }

        // --- Enkel Träfftavla ---
        function createSimpleTarget() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Pappersbakgrund
            ctx.fillStyle = '#e3dac9'; ctx.fillRect(0, 0, 512, 512);
            
            // Svart cirkel
            ctx.beginPath(); ctx.arc(256, 256, 200, 0, Math.PI * 2);
            ctx.fillStyle = '#111'; ctx.fill();
            
            // Liten vit Bullseye
            ctx.beginPath(); ctx.arc(256, 256, 15, 0, Math.PI * 2);
            ctx.fillStyle = '#fff'; ctx.fill();
            
            const texture = new THREE.CanvasTexture(canvas);
            const geometry = new THREE.PlaneGeometry(0.4, 0.4); // 40x40 cm
            const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
            target = new THREE.Mesh(geometry, material);
            target.visible = false;
            scene.add(target);

            targetDecals = new THREE.Group();
            target.add(targetDecals);
        }

        function createReticle() {
            const geometry = new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            reticle = new THREE.Mesh(geometry, material);
            reticle.matrixAutoUpdate = false; reticle.visible = false;
            scene.add(reticle);
        }

        // --- Avtryckare & Fysik ---
        function listenForTrigger() {
            requestAnimationFrame(listenForTrigger);
            if (!audioContext || placingMode) return;

            analyser.getByteFrequencyData(dataArray);
            if (Math.max(...dataArray) > 150 && (Date.now() - lastShotTime) > 800) {
                lastShotTime = Date.now();
                fireShot();
            }
        }

        function fireShot() {
            // Skapa visuell rekyl
            frontSightEl.querySelector('.white-dot').style.background = "red";
            sightVelY -= 30; // Vapnet hoppar upp!
            setTimeout(() => frontSightEl.querySelector('.white-dot').style.background = "#fff", 100);

            // Beräkna skottets riktning baserat på siktets felställning!
            // Om kornet är åt höger (positiv X), pekar pipan åt VÄNSTER jämfört med ögat.
            const vecX = (sightOffsetX / (window.innerWidth / 2));
            const vecY = -(sightOffsetY / (window.innerHeight / 2));
            
            raycaster.setFromCamera(new THREE.Vector2(vecX, vecY), camera);
            const intersects = raycaster.intersectObject(target);

            if (intersects.length > 0) {
                const localHit = target.worldToLocal(intersects[0].point.clone());
                
                const holeGeo = new THREE.CircleGeometry(0.005, 16);
                const holeMat = new THREE.MeshBasicMaterial({ color: 0xff0000, depthTest: false }); // Röda skotthål för synlighet i svarta tavlan
                const bulletHole = new THREE.Mesh(holeGeo, holeMat);
                bulletHole.position.set(localHit.x, localHit.y, 0.001);
                targetDecals.add(bulletHole);

                hits++;
                document.getElementById('hit-count').innerText = hits;
                statusBoard.innerText = "TRÄFF!"; statusBoard.style.color = "#00ff00";
            } else {
                statusBoard.innerText = "BOM!"; statusBoard.style.color = "#ff4444";
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function render(timestamp, frame) {
            if (frame) {
                // --- SIKT-FYSIK (Gyro) ---
                const currentRot = camera.rotation;
                let dX = currentRot.x - lastCamRot.x; // Pitch
                let dY = currentRot.y - lastCamRot.y; // Yaw

                // Om vi inte har ett extremt ryck (vilket ofta är ett wrap-around-fel)
                if(Math.abs(dX) < 0.3 && Math.abs(dY) < 0.3) {
                    // Tröghet - Siktet släpar efter när du roterar kameran
                    sightVelX -= dY * 1500; 
                    sightVelY += dX * 1500; 
                }
                lastCamRot.copy(currentRot);

                // Applicera fjädringsfysik (Spring physics)
                sightVelX *= 0.75; sightVelY *= 0.75; // Friktion
                sightOffsetX += sightVelX; sightOffsetY += sightVelY;
                
                // Dra alltid tillbaka till mitten (struket korn)
                sightOffsetX += (0 - sightOffsetX) * 0.15;
                sightOffsetY += (0 - sightOffsetY) * 0.15;

                // Maxa ur hur långt det kan flyga
                sightOffsetX = Math.max(-80, Math.min(80, sightOffsetX));
                sightOffsetY = Math.max(-60, Math.min(60, sightOffsetY));

                frontSightEl.style.transform = `translate(${sightOffsetX}px, ${sightOffsetY}px)`;

                // --- HIT-TEST LOGIK ---
                if (placingMode) {
                    const referenceSpace = renderer.xr.getReferenceSpace();
                    const session = renderer.xr.getSession();

                    if (!hitTestSourceRequested) {
                        session.requestReferenceSpace('viewer').then((refSpace) => {
                            session.requestHitTestSource({ space: refSpace }).then((source) => { hitTestSource = source; });
                        });
                        hitTestSourceRequested = true;
                    }

                    if (hitTestSource) {
                        const hitTestResults = frame.getHitTestResults(hitTestSource);
                        if (hitTestResults.length > 0) {
                            const hit = hitTestResults[0];
                            reticle.visible = true;
                            reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                            placeBtn.style.display = 'block';
                        } else {
                            reticle.visible = false; placeBtn.style.display = 'none';
                        }
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
